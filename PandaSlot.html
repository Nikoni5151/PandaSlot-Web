<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>PandaSlot</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		html, body, #canvas {
			width: 100%; height: 100%;
			overflow: hidden;
		}

		body {
			background-color: #000;
			touch-action: none;
		}

		#canvas {
			display: block;
		}

		#canvas:focus {
			outline: none;
		}

		/* ===== Loading Overlay ===== */
		#status {
			position: fixed;
			inset: 0;
			z-index: 1000;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background-color: #0a0a0a;
			background-image: url('loading_bg.png');
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			visibility: visible;
		}

		/* Vignette overlay for text readability */
		#status::before {
			content: '';
			position: absolute;
			inset: 0;
			background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
			pointer-events: none;
		}

		/* Bottom gradient for progress bar area */
		#status::after {
			content: '';
			position: absolute;
			bottom: 0; left: 0; right: 0;
			height: 30%;
			background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
			pointer-events: none;
		}

		#status > * {
			position: relative;
			z-index: 1;
		}

		/* ===== Logo ===== */
		#status-logo {
			position: absolute;
			top: 15%;
			width: min(50%, 420px);
			filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
		}

		/* ===== Bottom progress area ===== */
		#status-progress-area {
			position: absolute;
			bottom: 12%;
			width: 60%;
			max-width: 480px;
			display: none;
		}

		#status-loading-text {
			text-align: center;
			color: rgba(255,255,255,0.55);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			font-size: 13px;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			margin-bottom: 12px;
		}

		/* Custom progress bar */
		#status-progress-bar {
			width: 100%;
			height: 4px;
			background: rgba(255,255,255,0.12);
			border-radius: 2px;
			overflow: hidden;
			position: relative;
		}

		#status-progress-fill {
			width: 0%;
			height: 100%;
			background: linear-gradient(90deg, #ff6ec7, #7b2fff);
			border-radius: 2px;
			transition: width 0.3s ease-out;
			box-shadow: 0 0 10px rgba(123, 47, 255, 0.6), 0 0 20px rgba(255, 110, 199, 0.3);
		}

		#status-progress-pct {
			text-align: center;
			color: rgba(255,255,255,0.7);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			font-size: 14px;
			margin-top: 10px;
		}

		/* ===== Error notice ===== */
		#status-notice {
			position: absolute;
			bottom: 12%;
			width: 60%;
			max-width: 480px;
			display: none;
			background: rgba(91, 57, 67, 0.92);
			border-radius: 8px;
			border: 1px solid rgba(255, 110, 199, 0.4);
			color: #e0e0e0;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			font-size: 14px;
			line-height: 1.5;
			padding: 16px 20px;
			text-align: center;
			backdrop-filter: blur(6px);
		}

		/* ===== Hidden state ===== */
		#status-progress-area.visible { display: block; }
		#status-notice.visible { display: block; }
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="PandaSlot.icon.png" />
	<link rel="apple-touch-icon" href="PandaSlot.apple-touch-icon.png" />
</head>

	<script>
	const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":0,"ensureCrossOriginIsolationHeaders":false,"executable":"PandaSlot","experimentalVK":false,"fileSizes":{"PandaSlot.pck":68486952,"PandaSlot.wasm":1509558},"focusCanvas":true,"gdextensionLibs":["libspine_godot.web.template_release.wasm32.nothreads.wasm"],"godotPoolSize":0};
	const GODOT_THREADS_ENABLED = false;
	const engine = new Engine(GODOT_CONFIG);

	(function () {
		const statusOverlay = document.getElementById('status');
		const progressArea = document.getElementById('status-progress-area');
		const progressFill = document.getElementById('status-progress-fill');
		const progressPct = document.getElementById('status-progress-pct');
		const statusNotice = document.getElementById('status-notice');

		let initializing = true;
		let statusMode = '';

		function setStatusMode(mode) {
			if (statusMode === mode || !initializing) return;
			if (mode === 'hidden') {
				statusOverlay.style.opacity = '0';
				statusOverlay.style.transition = 'opacity 0.4s ease-out';
				setTimeout(() => statusOverlay.remove(), 400);
				initializing = false;
				return;
			}
			statusOverlay.style.visibility = 'visible';
			progressArea.classList.toggle('visible', mode === 'progress');
			statusNotice.classList.toggle('visible', mode === 'notice');
			statusMode = mode;
		}

		function setStatusNotice(text) {
			while (statusNotice.lastChild) {
				statusNotice.removeChild(statusNotice.lastChild);
			}
			text.split('\n').forEach((line) => {
				statusNotice.appendChild(document.createTextNode(line));
				statusNotice.appendChild(document.createElement('br'));
			});
		}

		function displayFailureNotice(err) {
			console.error(err);
			const msg = err instanceof Error ? err.message : (typeof err === 'string' ? err : 'An unknown error occurred.');
			setStatusNotice(msg);
			setStatusMode('notice');
			initializing = false;
		}

		const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });

		if (missing.length !== 0) {
			if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistration().then((reg) => {
					if (reg != null) return Promise.reject(new Error('Service worker already exists.'));
					return reg;
				}).then(() => engine.installServiceWorker()).then(() => {
					window.location.reload();
				}).catch((err) => {
					console.error('Error while registering service worker:', err);
				});
			} else {
				displayFailureNotice('Error\nThe following features required to run Godot projects on the Web are missing:\n' + missing.join('\n'));
			}
		} else {
			setStatusMode('progress');
			engine.startGame({
				'onProgress': function (current, total) {
					if (current > 0 && total > 0) {
						const pct = Math.round((current / total) * 100);
						progressFill.style.width = pct + '%';
						progressPct.textContent = pct + '%';
					}
				},
			}).then(() => {
				setStatusMode('hidden');
			}, displayFailureNotice);
		}
	}());
	</script>
